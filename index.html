<style>
/* ══ VARIABLES ══════════════════════════════════════ */
:root{
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
  --bg:#07090f; --bd1:rgba(55,138,221,.16); --bd2:rgba(55,138,221,.36);
  --c1:#dde2f0; --c2:#7a8eae; --c3:#3e4e6a;
  --acc:#4a9de8; --glow:rgba(55,138,221,.25); --glow2:rgba(55,138,221,.12);
  --tbg:rgba(255,255,255,.038); --tact:rgba(55,138,221,.13);
  --ibg:rgba(18,24,42,.88); --mbg:rgba(7,9,15,.97);
}
html.light{
  --bg:#edf1fa; --bd1:rgba(40,70,120,.16); --bd2:rgba(40,70,120,.36);
  --c1:#14213c; --c2:#3a5070; --c3:#6a80a0;
  --acc:#1a5fba; --glow:rgba(21,88,168,.22); --glow2:rgba(21,88,168,.1);
  --tbg:rgba(0,0,0,.04); --tact:rgba(21,88,168,.1);
  --ibg:rgba(255,255,255,.9); --mbg:rgba(245,248,255,.98);
}

/* ══ RESET ══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--c1);font-family:var(--font);}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 50% -5%,rgba(55,138,221,.18) 0%,transparent 70%),
    radial-gradient(ellipse 100% 60% at 50% 0%,#0b1428 0%,var(--bg) 72%);
}
html.light body::before{
  background:
    radial-gradient(ellipse 80% 50% at 50% -5%,rgba(100,160,255,.22) 0%,transparent 70%),
    radial-gradient(ellipse 100% 60% at 50% 0%,#c8daff 0%,var(--bg) 72%);
}

/* ══ LAYOUT 3 BANDES ════════════════════════════════ */
.app{
  position:relative;z-index:1;
  height:100vh;width:100%;max-width:700px;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;
}
/* Haut */
.top{flex-shrink:0;padding:0 18px;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;}
.eyebrow{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--c3);font-family:var(--mono);margin-bottom:3px;}
.ttl{font-size:18px;font-weight:700;color:var(--c1);letter-spacing:-.4px;line-height:1.15;}
.sub{font-size:9px;color:var(--acc);font-family:var(--mono);margin-top:2px;opacity:.8;letter-spacing:.5px;}
.hdr-r{display:flex;gap:7px;}
.ibtn{
  width:31px;height:31px;border-radius:50%;flex-shrink:0;
  border:.5px solid var(--bd1);background:var(--tbg);color:var(--c2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;backdrop-filter:blur(8px);
}
.ibtn:hover{border-color:var(--bd2);color:var(--c1);background:var(--tact);box-shadow:0 0 12px var(--glow2);}
.ibtn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.tabs{display:flex;gap:5px;margin-bottom:7px;}
.tab{
  flex:1;text-align:center;font-size:10.5px;font-weight:500;
  padding:6px 4px;border-radius:99px;white-space:nowrap;
  border:.5px solid var(--bd1);background:var(--tbg);color:var(--c2);
  cursor:pointer;transition:all .2s;letter-spacing:.1px;
}
.tab:hover{border-color:var(--bd2);color:var(--c1);}
.tab.act{
  background:var(--tact);color:var(--acc);border-color:var(--acc);
  box-shadow:0 0 14px var(--glow),inset 0 1px 0 rgba(255,255,255,.06);
}
.srch-w{position:relative;margin-bottom:8px;}
.srch-i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--c3);font-size:11px;pointer-events:none;}
.srch{
  width:100%;padding:7px 14px 7px 31px;
  border:.5px solid var(--bd1);border-radius:99px;
  background:var(--ibg);color:var(--c1);
  font-size:11.5px;font-family:var(--font);
  outline:none;transition:all .22s;backdrop-filter:blur(12px);
}
.srch::placeholder{color:var(--c3);}
.srch:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--glow2);}

/* Centre */
.mid{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;}
.cnt{flex-shrink:0;font-size:7.5px;color:var(--c3);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;padding:3px 0;}

.cw{flex:1;min-height:0;width:100%;position:relative;display:flex;flex-direction:column;}

/* ══ SCÈNE 3D ═══════════════════════════════════════
   .cs  = scène, remplit flex:1
   .cr  = anneau, position:absolute inset:0
   .ci  = item, top:50% left:50% dans l'anneau
          AUCUN translateX/Y sur .ci — centrage uniquement sur .bw
   .bw  = livre wrapper, translateX(-50%) translateY(-50%)
          .bw width = face width (tranche en position:absolute left)
          → -50% = centre exactement la face
══════════════════════════════════════════════════════ */
.cs{
  flex:1;min-height:80px;width:100%;
  perspective:1000px;perspective-origin:50% 50%;
  position:relative;overflow:visible;
}
.cr{
  position:absolute;inset:0;
  transform-style:preserve-3d;
  transition:transform .78s cubic-bezier(.22,.68,0,1.2);
}
.ci{
  position:absolute;top:50%;left:50%;
  cursor:pointer;transform-style:preserve-3d;
  /* PAS de translateX/Y ici — le centrage est sur .bw */
}
.ci:not(.act) .bw{opacity:.32;filter:brightness(.44) saturate(.45);}
.ci.act .bw{opacity:1;}

/* Flèches — invisibles par défaut, visibles au survol du carousel */
.arr{
  position:absolute;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:50%;
  border:.5px solid var(--bd2);
  background:rgba(7,9,15,.85);
  color:var(--c2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:17px;
  z-index:10;user-select:none;
  backdrop-filter:blur(12px);
  box-shadow:0 2px 12px rgba(0,0,0,.4);
  opacity:0;
  transition:opacity .25s, border-color .2s, color .2s, box-shadow .2s;
  pointer-events:none;
}
.cw:hover .arr{ opacity:1; pointer-events:auto; }
.arr:hover{border-color:var(--acc);color:var(--acc);box-shadow:0 0 18px var(--glow);}
html.light .arr{background:rgba(235,242,255,.9);}
.arr.l{left:4px;}.arr.r{right:4px;}

/* Dots */
.dots{flex-shrink:0;display:flex;gap:5px;justify-content:center;align-items:center;padding:5px 0 2px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--bd1);cursor:pointer;transition:all .3s;}
.dot.act{background:var(--acc);width:16px;border-radius:99px;box-shadow:0 0 7px var(--glow);}

/* ══ LIVRE 3D ═══════════════════════════════════════
   Centrage garanti par pixels fixes :
   translateX(-60px) = -FW/2 = centre horizontal de la face
   translateY(-90px) = -BH/2 = centre vertical du livre
   → indépendant de la taille calculée, fonctionne dans preserve-3d
══════════════════════════════════════════════════════ */
.bw{
  display:block;
  position:relative;
  transform:translateX(-60px) translateY(-90px);
  transition:filter .3s,opacity .3s;
}

/* Halo sol sous le livre actif */
.bg{
  position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);
  width:90%;height:18px;border-radius:50%;
  background:var(--acc);filter:blur(16px);
  opacity:0;transition:opacity .5s;pointer-events:none;
}
.ci.act .bg{opacity:.35;}

/* Conteneur 3D : rotation appliquée ici */
.b3{
  display:flex;align-items:stretch;
  position:relative;
  transform:perspective(640px) rotateY(-26deg) rotateX(1.5deg);
  transition:transform .52s cubic-bezier(.22,.68,0,1.1);
  filter:drop-shadow(8px 16px 32px rgba(0,0,0,.8));
}
/* Actif : de face — translateX(+10px) compense le poids visuel de la tranche */
.ci.act .b3{
  transform:perspective(900px) rotateY(0deg) rotateX(0deg) translateX(10px) translateY(-6px) scale(1.06);
  filter:drop-shadow(0 24px 48px rgba(0,0,0,.9)) drop-shadow(0 0 30px var(--glow2));
}
.ci.act .b3:hover{
  transform:perspective(900px) rotateY(-11deg) rotateX(3deg) translateX(5px) translateY(-9px) scale(1.07);
}

/* Tranche : sort à GAUCHE de la face sans affecter la largeur */
.bs{
  position:absolute;right:100%;top:0;
  width:26px;height:var(--bh,180px);
  border-radius:3px 0 0 3px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
/* Ombres et reflets de reliure */
.bs::after{content:'';position:absolute;right:0;top:0;width:4px;height:100%;
  background:linear-gradient(to right,rgba(0,0,0,.55),rgba(0,0,0,.15));}
.bs::before{content:'';position:absolute;left:0;top:0;width:3px;height:100%;
  background:linear-gradient(to right,rgba(255,255,255,.18),rgba(255,255,255,.04));}
/* Reflet central */
.bs-shine{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,.12) 0%,rgba(255,255,255,.03) 40%,rgba(0,0,0,.1) 100%);pointer-events:none;}
.bs-t{
  position:relative;z-index:1;
  writing-mode:vertical-rl;transform:rotate(180deg);
  font-size:6px;color:rgba(255,255,255,.5);font-family:var(--mono);
  letter-spacing:1.2px;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;max-height:150px;padding:0 3px;
}

/* Face du livre */
.bf{
  width:var(--fw,120px);height:var(--bh,180px);
  border-radius:0 4px 4px 0;
  position:relative;overflow:hidden;flex-shrink:0;
}
/* Canvas couverture */
.bc{position:absolute;inset:0;width:100%;height:100%;display:block;border-radius:0 4px 4px 0;}
/* Reflet global sur toute la face */
.bf-shine{
  position:absolute;inset:0;z-index:4;pointer-events:none;border-radius:0 4px 4px 0;
  background:linear-gradient(148deg,rgba(255,255,255,.16) 0%,rgba(255,255,255,.04) 30%,transparent 60%);
}
/* Filet de pages côté droit */
.bf-edge{
  position:absolute;right:0;top:0;z-index:4;width:4px;height:100%;
  background:linear-gradient(to right,rgba(0,0,0,.1),rgba(255,255,255,.15) 50%,rgba(200,200,200,.05));
}

/* Vide */
.empty{display:none;text-align:center;color:var(--c3);padding:20px;margin:auto;}
.empty.on{display:block;}

/* ══ BAS : infos ═════════════════════════════════════ */
.bot{flex-shrink:0;padding:4px 18px 14px;text-align:center;}
.ibadge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:7.5px;letter-spacing:1.8px;text-transform:uppercase;
  font-family:var(--mono);padding:3px 12px;border-radius:99px;
  border:.5px solid var(--bd2);background:var(--tact);color:var(--acc);
  margin-bottom:6px;
}
.ittl{font-size:14px;font-weight:600;color:var(--c1);margin-bottom:2px;line-height:1.3;}
.iauth{font-size:11px;color:var(--c2);font-style:italic;margin-bottom:3px;}
.imeta{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;font-size:8.5px;color:var(--c3);font-family:var(--mono);}
.imeta span{display:flex;align-items:center;gap:3px;}
.ifiche{
  display:inline-flex;align-items:center;gap:5px;margin-top:9px;
  padding:7px 20px;border-radius:99px;border:.5px solid var(--bd2);
  background:var(--tact);color:var(--acc);font-size:10px;cursor:pointer;
  transition:all .2s;font-family:var(--font);letter-spacing:.2px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.ifiche:hover{background:var(--acc);color:#fff;box-shadow:0 0 18px var(--glow);border-color:var(--acc);}

/* ══ MODALS ══════════════════════════════════════════ */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:200;
  align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(10px);}
.ov.open{display:flex;}
.mb{
  background:var(--mbg);border:.5px solid var(--bd2);border-radius:18px;
  padding:22px 20px;width:min(460px,100%);max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 70px rgba(0,0,0,.7),0 0 50px var(--glow2),inset 0 1px 0 rgba(255,255,255,.04);
  animation:mi .28s cubic-bezier(.22,.68,0,1.2) both;
}
@keyframes mi{from{opacity:0;transform:scale(.9) translateY(14px)}to{opacity:1;transform:none}}
.mhdr{display:flex;gap:14px;margin-bottom:16px;padding-bottom:14px;border-bottom:.5px solid var(--bd1);}
.mbmini{flex-shrink:0;}.minfo{flex:1;}
.mbadge{display:inline-block;font-size:7.5px;letter-spacing:1.8px;text-transform:uppercase;font-family:var(--mono);
  padding:2px 10px;border-radius:99px;border:.5px solid var(--bd2);background:var(--tact);color:var(--acc);margin-bottom:7px;}
.mttl{font-size:13.5px;font-weight:600;color:var(--c1);margin-bottom:3px;line-height:1.3;}
.mauth{font-size:11px;color:var(--c2);font-style:italic;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.mf{background:var(--tbg);border:.5px solid var(--bd1);border-radius:9px;padding:9px 11px;}
.mfl{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--c3);font-family:var(--mono);margin-bottom:3px;}
.mfv{font-size:11.5px;color:var(--c1);}
.mdesc{font-size:11.5px;color:var(--c2);line-height:1.8;margin-bottom:16px;}
.mclose{width:100%;padding:9px;border-radius:99px;border:.5px solid var(--bd1);background:none;
  color:var(--c2);font-size:11px;cursor:pointer;transition:all .2s;font-family:var(--font);}
.mclose:hover{border-color:var(--bd2);color:var(--c1);background:var(--tact);}

.ambox{max-width:400px;}
.ambox input,.ambox select,.ambox textarea{
  width:100%;padding:7px 10px;border:.5px solid var(--bd1);border-radius:8px;
  background:var(--ibg);color:var(--c1);font-size:11px;font-family:var(--font);
  margin-bottom:7px;outline:none;transition:border .2s;-webkit-appearance:none;}
.ambox input:focus,.ambox select:focus,.ambox textarea:focus{border-color:var(--acc);box-shadow:0 0 0 2px var(--glow2);}
.ambox textarea{resize:vertical;min-height:64px;line-height:1.6;}
.fl{font-size:8.5px;color:var(--c3);margin-bottom:2px;font-family:var(--mono);letter-spacing:.3px;}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:0 10px;}
.mfoot{display:flex;gap:8px;margin-top:4px;}
.mfoot button{flex:1;padding:9px;border-radius:99px;font-size:11px;cursor:pointer;font-family:var(--font);transition:all .2s;border:.5px solid;}
.bcnl{background:none;color:var(--c2);border-color:var(--bd1);}.bcnl:hover{background:var(--tbg);color:var(--c1);}
.bsav{background:var(--tact);color:var(--acc);border-color:var(--acc);}.bsav:hover{background:var(--acc);color:#fff;box-shadow:0 0 14px var(--glow);}
.mh3{font-size:13px;font-weight:600;color:var(--c1);margin-bottom:13px;}

/* ══ TOAST ═══════════════════════════════════════════ */
.toast{
  position:fixed;bottom:16px;left:50%;z-index:300;
  transform:translateX(-50%) translateY(70px);
  background:rgba(7,9,15,.97);border:.5px solid var(--bd2);border-radius:99px;
  padding:8px 20px;font-size:11px;color:var(--c1);
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  transition:transform .32s cubic-bezier(.22,.68,0,1.2),opacity .32s;
  opacity:0;pointer-events:none;white-space:nowrap;
}
html.light .toast{background:rgba(255,255,255,.97);}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}

::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--bd1);border-radius:99px;}
@media(max-width:400px){.tab{font-size:9.5px;padding:5px 3px;}.ttl{font-size:15px;}}
</style>
</head>
<body>
<div class="app">

  <!-- HAUT -->
  <div class="top">
    <header class="hdr">
      <div>
        <div class="eyebrow">Diplôme d'État · Saxophone</div>
        <div class="ttl">Répertoires Pédagogiques</div>
        <div class="sub">Bibliothèque de partitions</div>
      </div>
      <div class="hdr-r">
        <button class="ibtn" id="tbtn">
          <svg id="imoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="isun" viewBox="0 0 24 24" style="display:none">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="ibtn" id="abtn">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </header>
    <div class="tabs" id="tabs">
      <div class="tab act" data-c="1">Cycle 1</div>
      <div class="tab" data-c="2">Cycle 2</div>
      <div class="tab" data-c="3">Cycle 3</div>
    </div>
    <div class="srch-w">
      <span class="srch-i">🔍</span>
      <input class="srch" id="srch" type="text" placeholder="Titre, auteur, éditeur, genre…" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <!-- CENTRE -->
  <div class="mid">
    <div class="cnt" id="cnt">—</div>
    <div class="cw">
      <button class="arr l" id="arrl">‹</button>
      <div class="cs" id="cs"><div class="cr" id="ring"></div></div>
      <button class="arr r" id="arrr">›</button>
      <div class="empty" id="empty"><div style="font-size:32px;margin-bottom:8px">🔍</div><div style="font-size:11px">Aucune partition trouvée.</div></div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <!-- BAS -->
  <div class="bot">
    <div class="ibadge" id="ibadge"> </div>
    <div class="ittl" id="ittl">Sélectionnez une partition</div>
    <div class="iauth" id="iauth"></div>
    <div class="imeta" id="imeta"></div>
    <button class="ifiche" id="ifiche">Voir la fiche complète →</button>
  </div>
</div>

<!-- Modal détail -->
<div class="ov" id="od">
  <div class="mb">
    <div class="mhdr">
      <div class="mbmini" id="mmini"></div>
      <div class="minfo"><div class="mbadge" id="mbadge"></div><div class="mttl" id="mttl"></div><div class="mauth" id="mauth"></div></div>
    </div>
    <div class="mgrid" id="mgrid"></div>
    <p class="mdesc" id="mdesc"></p>
    <button class="mclose" id="odcl">Fermer</button>
  </div>
</div>

<!-- Modal ajout -->
<div class="ov" id="oa">
  <div class="mb ambox">
    <div class="mh3">Ajouter une partition</div>
    <div class="fl">Titre *</div><input type="text" id="at" placeholder="50 Études Faciles…" maxlength="120">
    <div class="ag">
      <div><div class="fl">Auteur *</div><input type="text" id="au" placeholder="Guy Lacour" maxlength="80"></div>
      <div><div class="fl">Éditeur</div><input type="text" id="ae" placeholder="Billaudot" maxlength="60"></div>
    </div>
    <div class="ag">
      <div><div class="fl">Année</div><input type="number" id="ay" placeholder="1974" min="1800" max="2099"></div>

/* ════ CANVAS COUVERTURES ═══════════════════════════ */
function hex2rgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function lc(h,a){const{r,g,b}=hex2rgb(h);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}
function dc(h,a){const{r,g,b}=hex2rgb(h);return`rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;}
function mc(h,f){const{r,g,b}=hex2rgb(h);return`rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;}

function wrapText(ctx,txt,maxW,fs){
  ctx.font=fs;
  return txt.split(' ').reduce((acc,w)=>{
    const l=acc[acc.length-1];
    if(l&&ctx.measureText(l+' '+w).width<=maxW)acc[acc.length-1]=l+' '+w;
    else acc.push(w);
    return acc;
  },[]);
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawCover(cvs,bk){
  const W=cvs.width,H=cvs.height,ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const col=bk.col;

  /* ── Fond : dégradé riche en deux axes ── */
  const gMain=ctx.createLinearGradient(0,0,W*.6,H);
  gMain.addColorStop(0,lc(col,28));
  gMain.addColorStop(.45,col);
  gMain.addColorStop(1,dc(col,22));
  ctx.fillStyle=gMain;
  ctx.fillRect(0,0,W,H);

  /* Overlay texture noise simulé via micro-lignes */
  ctx.save();
  ctx.globalAlpha=.035;
  for(let y=0;y<H;y+=2){
    ctx.fillStyle=Math.random()>.5?'#fff':'#000';
    ctx.fillRect(0,y,W,1);
  }
  ctx.restore();

  /* ── Bande haute — éditeur ── */
  const bh=Math.round(H*.2);
  const gTop=ctx.createLinearGradient(0,0,0,bh);
  gTop.addColorStop(0,'rgba(255,255,255,.24)');
  gTop.addColorStop(1,'rgba(255,255,255,.06)');
  ctx.fillStyle=gTop;ctx.fillRect(0,0,W,bh);

  /* Ligne de séparation fine */
  ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(7,bh);ctx.lineTo(W-7,bh);ctx.stroke();

  /* Éditeur */
  const eSize=Math.round(W*.078);
  ctx.font=`700 ${eSize}px -apple-system,Helvetica Neue,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.78)';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='2px';
  ctx.fillText(bk.ed.toUpperCase(),W/2,bh/2);
  ctx.letterSpacing='0px';

  /* ── Zone centrale titre ── */
  const zY=bh+9,zH=Math.round(H*.46);

  /* Fond semi-transparent arrondi */
  ctx.fillStyle='rgba(0,0,0,.18)';
  rr(ctx,8,zY,W-16,zH,5);ctx.fill();
  /* Liseré supérieur lumineux */
  ctx.strokeStyle='rgba(255,255,255,.16)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(12,zY);ctx.lineTo(W-12,zY);ctx.stroke();

  /* Titre */
  const tSize=Math.round(W*.112);
  const tFont=`700 ${tSize}px -apple-system,Helvetica Neue,sans-serif`;
  const lines=wrapText(ctx,bk.t,W-22,tFont);
  ctx.font=tFont;
  ctx.fillStyle='rgba(255,255,255,.98)';
  ctx.textAlign='center';ctx.textBaseline='middle';

  /* Légère ombre portée sur le texte */
  ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=6;ctx.shadowOffsetY=2;

  const lh=tSize*1.25;
  const totH=lines.length*lh;
  let ty=zY+(zH-totH)/2+lh/2;
  lines.forEach(l=>{ctx.fillText(l,W/2,ty);ty+=lh;});
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;

  /* Sous-titre */
  if(bk.st){
    ctx.font=`300 italic ${Math.round(W*.075)}px Georgia,serif`;
    ctx.fillStyle='rgba(255,255,255,.55)';
    ctx.textBaseline='top';
    ctx.fillText(bk.st,W/2,zY+zH+7);
  }

  /* ── Séparateur décoratif ── */
  const sepY=zY+zH+(bk.st?28:14);
  /* Losange central */
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.translate(W/2,sepY);ctx.rotate(Math.PI/4);
  ctx.fillRect(-3,-3,6,6);
  ctx.restore();
  /* Lignes de chaque côté */
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=.7;
  ctx.beginPath();ctx.moveTo(W*.15,sepY);ctx.lineTo(W*.42,sepY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W*.58,sepY);ctx.lineTo(W*.85,sepY);ctx.stroke();

  /* ── Auteur ── */
  ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=4;ctx.shadowOffsetY=1;
  ctx.font=`400 ${Math.round(W*.09)}px Georgia,'Times New Roman',serif`;
  ctx.fillStyle='rgba(255,255,255,.86)';
  ctx.textBaseline='bottom';ctx.textAlign='center';
  ctx.fillText(bk.a,W/2,H-26);
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;

  /* Année */
  ctx.font=`300 ${Math.round(W*.068)}px -apple-system,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.textBaseline='bottom';
  ctx.fillText(String(bk.y),W/2,H-10);

  /* ── Reflet diagonal haut-gauche ── */
  const gRef=ctx.createLinearGradient(0,0,W*.7,H*.45);
  gRef.addColorStop(0,'rgba(255,255,255,.1)');
  gRef.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gRef;ctx.fillRect(0,0,W,H);

  /* ── Vignette bords ── */
  const gVig=ctx.createRadialGradient(W/2,H/2,W*.2,W/2,H/2,W*.8);
  gVig.addColorStop(0,'rgba(0,0,0,0)');
  gVig.addColorStop(1,'rgba(0,0,0,.32)');
  ctx.fillStyle=gVig;ctx.fillRect(0,0,W,H);
}

/* ════ DIMENSIONS LIVRE ═════════════════════════════
   FW = face width. BH = book height. SW = spine width.
   .ci dans le carousel : top:50%; left:50%; PAS de translateX/Y
   .bw : translateX(-50%) translateY(-50%)
         width de .bw = FW (tranche en absolute)
         → -50% = -FW/2 → centre parfaitement la face
════════════════════════════════════════════════════ */
const FW=120,BH=180,SW=26;
// Set CSS vars
document.documentElement.style.setProperty('--fw',FW+'px');
document.documentElement.style.setProperty('--bh',BH+'px');

/* ════ CAROUSEL ═════════════════════════════════════ */
const ring=document.getElementById('ring');
let cyc=1,idx=0,books=[];

function getR(n){
  const w=innerWidth;
  const base=w<440?155:w<620?215:w<800?260:295;
  return n>8?base+45:n>5?base+22:base;
}

function build(bklist){
  ring.innerHTML='';
  const dotsEl=document.getElementById('dots');dotsEl.innerHTML='';
  const em=document.getElementById('empty'),cs=document.getElementById('cs');
  document.getElementById('cnt').textContent=
    bklist.length?`${bklist.length} partition${bklist.length>1?'s':''}`:'';

  if(!bklist.length){
    em.classList.add('on');cs.style.visibility='hidden';
    dotsEl.style.display='none';updateInfo(null);return;
  }
  em.classList.remove('on');cs.style.visibility='';dotsEl.style.display='';

  const n=bklist.length,step=360/n,R=getR(n);

  bklist.forEach((bk,i)=>{
    const el=document.createElement('div');
    el.className='ci'+(i===idx?' act':'');

    /* ── CENTRAGE DÉFINITIF ──────────────────────────
       .ci a top:50%; left:50% → son coin supérieur-gauche
       est au centre de la scène.
       On ne met AUCUN translateX/Y sur .ci.
       Le centrage est uniquement sur .bw (translateX(-50%)
       translateY(-50%)) dont la largeur = FW (face seule).
    ─────────────────────────────────────────────────── */
    el.style.transform = n===1
      ? 'none'
      : `rotateY(${i*step}deg) translateZ(${R}px)`;

    el.innerHTML=`<div class="bw">
      <div class="bg"></div>
      <div class="b3">
        <div class="bs" style="background:${bk.sp}">
          <div class="bs-shine"></div>
          <div class="bs-t">${bk.a}</div>
        </div>
        <div class="bf">
          <canvas class="bc" width="${FW}" height="${BH}"></canvas>
          <div class="bf-shine"></div>
          <div class="bf-edge"></div>
        </div>
      </div>
    </div>`;

    const cvs=el.querySelector('.bc');
    if(bk.cu){
      const img=new Image();img.crossOrigin='anonymous';
      img.onload=()=>cvs.getContext('2d').drawImage(img,0,0,FW,BH);
      img.onerror=()=>drawCover(cvs,bk);img.src=bk.cu;
    } else drawCover(cvs,bk);

    el.addEventListener('click',()=>{if(i===idx)openDetail(bklist[i]);else goto(i);});
    ring.appendChild(el);

    const d=document.createElement('div');
    d.className='dot'+(i===idx?' act':'');
    d.onclick=()=>goto(i);dotsEl.appendChild(d);
  });

  totalDeg=0;
  rotate();updateInfo(bklist[idx]);
}

/* totalDeg accumule la rotation — jamais réinitialisé → défilement infini */
let totalDeg=0;

function rotate(){
  const n=books.length;if(!n)return;
  ring.style.transform=n===1?'':`rotateY(${totalDeg}deg)`;
}
function goto(i, dir){
  const n=books.length;if(!n)return;
  /* Si dir est fourni on l'utilise pour choisir le sens court ou long */
  if(dir===undefined){
    /* clic direct sur un item : chemin le plus court */
    let delta=(i-idx+n)%n;
    if(delta>n/2)delta-=n;
    totalDeg-=delta*(360/n);
  } else {
    totalDeg+=dir*(360/n);
  }
  idx=i;
  ring.querySelectorAll('.ci').forEach((e,j)=>e.classList.toggle('act',j===i));
  document.querySelectorAll('.dot').forEach((e,j)=>e.classList.toggle('act',j===i));
  rotate();updateInfo(books[i]);
}
function nav(d){
  const n=books.length;if(!n)return;
  goto((idx-d+n)%n, d);
}

function updateInfo(bk){
  if(!bk){document.getElementById('ittl').textContent='Aucun résultat';['iauth','ibadge','imeta'].forEach(id=>document.getElementById(id).textContent='');return;}
  document.getElementById('ibadge').textContent=`Cycle ${cyc} · ${bk.g}`;
  document.getElementById('ittl').textContent=bk.t;
  document.getElementById('iauth').textContent=bk.a;
  document.getElementById('imeta').innerHTML=`<span>🎵 ${bk.nv}</span><span>📅 ${bk.y}</span><span>📚 ${bk.ed}</span>`;
  document.getElementById('ifiche').onclick=()=>openDetail(bk);
}

/* ════ FILTRE ═══════════════════════════════════════ */
function filter(){
  const q=document.getElementById('srch').value.toLowerCase().trim();
  const all=[...(DATA[cyc]||[])];
  books=q?all.filter(b=>[b.t,b.a,b.ed,b.g,b.nv,b.desc||''].some(s=>s.toLowerCase().includes(q))):all;
  idx=0;build(books);
}

/* ════ MODAL DÉTAIL ══════════════════════════════════ */
function openDetail(bk){
  document.getElementById('mbadge').textContent=`Cycle ${cyc} · ${bk.g}`;
  document.getElementById('mttl').textContent=bk.t;
  document.getElementById('mauth').textContent=bk.a;
  const mW=58,mH=84;
  const mc2=document.createElement('canvas');mc2.width=mW;mc2.height=mH;
  if(bk.cu){const i=new Image();i.crossOrigin='anonymous';i.onload=()=>mc2.getContext('2d').drawImage(i,0,0,mW,mH);i.onerror=()=>drawCover(mc2,bk);i.src=bk.cu;}
  else drawCover(mc2,bk);
  mc2.style.cssText='border-radius:0 3px 3px 0;display:block;box-shadow:3px 4px 14px rgba(0,0,0,.6);';
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;transform:perspective(240px) rotateY(-14deg) rotateX(2deg);filter:drop-shadow(4px 6px 14px rgba(0,0,0,.5));';
  const spEl=document.createElement('div');
  spEl.style.cssText=`width:9px;height:${mH}px;background:${bk.sp};border-radius:3px 0 0 3px;flex-shrink:0;`;
  wrap.appendChild(spEl);wrap.appendChild(mc2);
  document.getElementById('mmini').innerHTML='';document.getElementById('mmini').appendChild(wrap);
  document.getElementById('mgrid').innerHTML=`
    <div class="mf"><div class="mfl">Éditeur</div><div class="mfv">${bk.ed}</div></div>
    <div class="mf"><div class="mfl">Année</div><div class="mfv">${bk.y}</div></div>
    <div class="mf"><div class="mfl">Niveau</div><div class="mfv">${bk.nv}</div></div>
    <div class="mf"><div class="mfl">Genre</div><div class="mfv">${bk.g}</div></div>`;
  document.getElementById('mdesc').textContent=bk.desc||'';
  document.getElementById('od').classList.add('open');
}
document.getElementById('odcl').onclick=()=>document.getElementById('od').classList.remove('open');
document.getElementById('od').onclick=e=>{if(e.target===document.getElementById('od'))document.getElementById('od').classList.remove('open');};

/* ════ MODAL AJOUT ═══════════════════════════════════ */
document.getElementById('abtn').onclick=()=>{document.getElementById('ac').value=cyc;document.getElementById('oa').classList.add('open');};
document.getElementById('oacl').onclick=()=>document.getElementById('oa').classList.remove('open');
document.getElementById('oa').onclick=e=>{if(e.target===document.getElementById('oa'))document.getElementById('oa').classList.remove('open');};
document.getElementById('oasv').onclick=()=>{
  const t=document.getElementById('at').value.trim(),a=document.getElementById('au').value.trim();
  const c=parseInt(document.getElementById('ac').value);
  if(!t||!a){toast('⚠️ Titre et auteur requis');return;}
  const cols={1:['#1a3e72','#0d2448'],2:['#1e4a78','#102e50'],3:['#1a285a','#0e183a']};
  const[cl,sp]=cols[c]||cols[1];
  const nb={id:'u'+Date.now(),t,st:'',a,ed:document.getElementById('ae').value.trim()||'—',
    y:parseInt(document.getElementById('ay').value)||new Date().getFullYear(),
    nv:document.getElementById('an').value.trim()||'—',g:document.getElementById('ag2').value.trim()||'—',
    col:cl,sp,cu:document.getElementById('acu').value.trim()||null,desc:document.getElementById('ad').value.trim()};
  if(!DATA[c])DATA[c]=[];DATA[c].unshift(nb);
  ['at','au','ae','ay','an','ag2','acu','ad'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('oa').classList.remove('open');
  cyc=c;idx=0;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('act',parseInt(t.dataset.c)===c));
  filter();toast('✓ Partition ajoutée !');
};

/* ════ NAVIGATION ════════════════════════════════════ */
document.getElementById('arrl').onclick=()=>nav(1);
document.getElementById('arrr').onclick=()=>nav(-1);
document.addEventListener('keydown',e=>{
  if(document.activeElement===document.getElementById('srch'))return;
  if(e.key==='ArrowLeft')nav(1);if(e.key==='ArrowRight')nav(-1);
  if(e.key==='Escape'){document.getElementById('od').classList.remove('open');document.getElementById('oa').classList.remove('open');}
  if(e.key==='Enter'&&books[idx])openDetail(books[idx]);
});
let tx=0;
const sc=document.getElementById('cs');
sc.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
sc.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>44)nav(dx<0?-1:1);},{passive:true});
sc.addEventListener('wheel',e=>{e.preventDefault();nav(e.deltaY>0?-1:1);},{passive:false});

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('act'));
    tab.classList.add('act');cyc=parseInt(tab.dataset.c);idx=0;
    document.getElementById('srch').value='';filter();
  });
});
let st;document.getElementById('srch').addEventListener('input',()=>{clearTimeout(st);st=setTimeout(filter,180);});
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>build(books),200);});

/* ════ TOAST + INIT ══════════════════════════════════ */
let tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('on'),2600);}
try{firebase.initializeApp(FIREBASE_CONFIG);}catch(e){}
filter();
</script>
</body>
</html>

<style>
/* ══════════════════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════════════════ */
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono','Fira Code', monospace;
  --br-sm:4px; --br-md:8px; --br-lg:12px;

  --body-bg:  #090c16;
  --bg2:      #0f1420;
  --bd1:      rgba(55,138,221,0.18);
  --bd2:      rgba(55,138,221,0.38);
  --ct1:      #e8eaf0;
  --ct2:      #8a9ab8;
  --ct3:      #4a5a78;
  --accent:   #378ADD;
  --acglow:   rgba(55,138,221,0.28);
  --tab-bg:   rgba(255,255,255,0.04);
  --tab-act:  rgba(55,138,221,0.14);
  --input-bg: rgba(22,28,46,0.85);
  --modal-bg: rgba(9,12,22,0.97);
}
html.light {
  --body-bg:  #eaeef8;
  --bg2:      #ffffff;
  --bd1:      rgba(58,78,112,0.18);
  --bd2:      rgba(58,78,112,0.38);
  --ct1:      #18243c;
  --ct2:      #3a4e70;
  --ct3:      #6a7e9a;
  --accent:   #1558a8;
  --acglow:   rgba(21,88,168,0.22);
  --tab-bg:   rgba(0,0,0,0.04);
  --tab-act:  rgba(21,88,168,0.1);
  --input-bg: rgba(255,255,255,0.88);
  --modal-bg: rgba(248,250,255,0.98);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body {
  background: var(--body-bg);
  color: var(--ct1);
  font-family: var(--font-sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Fond dégradé simple */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse 100% 60% at 50% 0%, #0d1a3a 0%, var(--body-bg) 70%);
}
html.light body::before {
  background: radial-gradient(ellipse 100% 60% at 50% 0%, #d6e4ff 0%, var(--body-bg) 70%);
}

/* ══════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════ */
.app {
  position:relative; z-index:1;
  max-width:720px; margin:0 auto;
  padding:0 18px 80px;
  display:flex; flex-direction:column; align-items:center;
}

/* ══════════════════════════════════════════════════
   EN-TÊTE
══════════════════════════════════════════════════ */
.app-header {
  width:100%; display:flex; align-items:center;
  justify-content:space-between; padding:20px 0 14px;
}
.header-left .eyebrow {
  font-size:9px; letter-spacing:2.5px; text-transform:uppercase;
  color:var(--ct3); font-family:var(--font-mono); margin-bottom:4px;
}
.header-left .title {
  font-size:19px; font-weight:700; color:var(--ct1); line-height:1.15;
  letter-spacing:-0.3px;
}
.header-left .subtitle {
  font-size:11px; color:var(--accent); font-family:var(--font-mono);
  margin-top:2px; opacity:.85;
}
.header-right { display:flex; gap:8px; align-items:center; }

.icon-btn {
  width:34px; height:34px; border-radius:50%;
  border:0.5px solid var(--bd1); background:var(--tab-bg);
  color:var(--ct2); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .18s; backdrop-filter:blur(6px); flex-shrink:0;
}
.icon-btn:hover { border-color:var(--bd2); color:var(--ct1); background:var(--tab-act); }
.icon-btn svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.8; }

/* ══════════════════════════════════════════════════
   ONGLETS + RECHERCHE
══════════════════════════════════════════════════ */
.controls { width:100%; margin-bottom:10px; }
.cycle-tabs { display:flex; gap:6px; margin-bottom:10px; }
.cycle-tab {
  flex:1; text-align:center; font-size:12px; font-weight:500;
  padding:7px 8px; border-radius:99px;
  border:0.5px solid var(--bd1); background:var(--tab-bg);
  color:var(--ct2); cursor:pointer; transition:all .2s; white-space:nowrap;
}
.cycle-tab:hover { border-color:var(--bd2); color:var(--ct1); }
.cycle-tab.active {
  background:var(--tab-act); color:var(--accent);
  border-color:var(--accent); box-shadow:0 0 12px var(--acglow);
}
.search-wrap { position:relative; }
.search-icon {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  color:var(--ct3); font-size:13px; pointer-events:none;
}
.search-input {
  width:100%; padding:8px 14px 8px 35px;
  border:0.5px solid var(--bd1); border-radius:99px;
  background:var(--input-bg); color:var(--ct1);
  font-size:13px; font-family:var(--font-sans);
  outline:none; transition:all .2s; backdrop-filter:blur(10px);
}
.search-input::placeholder { color:var(--ct3); }
.search-input:focus { border-color:var(--bd2); box-shadow:0 0 0 3px var(--acglow); }

/* ══════════════════════════════════════════════════
   COMPTEUR
══════════════════════════════════════════════════ */
.count-badge {
  font-size:9px; color:var(--ct3); font-family:var(--font-mono);
  letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px;
  text-align:center;
}

/* ══════════════════════════════════════════════════
   CAROUSEL 3D
══════════════════════════════════════════════════ */
.carousel-wrap { width:100%; position:relative; margin-bottom:4px; }

.carousel-scene {
  width:100%; height:260px;
  perspective:1200px;
  position:relative; overflow:visible;
}

.carousel-ring {
  position:absolute; width:100%; height:100%;
  transform-style:preserve-3d;
  transition:transform .75s cubic-bezier(.25,.46,.45,.94);
  top:0; left:0;
}

.carousel-item {
  position:absolute; top:50%; left:50%;
  cursor:pointer; transform-style:preserve-3d;
}

/* Items inactifs : assombris */
.carousel-item:not(.active) .bk-wrap { opacity:.45; filter:brightness(.6) saturate(.7); }
.carousel-item.active .bk-wrap { opacity:1; }

/* Flèches */
.arr {
  position:absolute; top:50%; transform:translateY(-50%);
  width:36px; height:36px; border-radius:50%;
  border:0.5px solid var(--bd2); background:rgba(9,12,22,.75);
  color:var(--ct2); cursor:pointer; display:flex;
  align-items:center; justify-content:center; font-size:17px;
  transition:all .2s; z-index:10; backdrop-filter:blur(10px); user-select:none;
}
.arr:hover { border-color:var(--accent); color:var(--accent); box-shadow:0 0 12px var(--acglow); }
html.light .arr { background:rgba(240,244,251,.85); }
.arr.left  { left:-4px; }
.arr.right { right:-4px; }

/* ══════════════════════════════════════════════════
   LIVRE 3D
══════════════════════════════════════════════════ */
.bk-wrap {
  display:flex; position:relative;
  /* centrage : le coin haut-gauche du livre est à 50%/50% de l'item, on décale */
  transform:translateX(-50%) translateY(-50%);
  transition:filter .4s, opacity .4s;
}

/* Halo sous le livre actif */
.bk-glow {
  position:absolute; bottom:-16px; left:50%; transform:translateX(-50%);
  width:80%; height:16px; border-radius:50%;
  background:var(--acglow); filter:blur(10px);
  opacity:0; transition:opacity .4s; pointer-events:none;
}
.carousel-item.active .bk-glow { opacity:1; }

/* Tranche */
.bk-spine {
  width:16px; height:176px;
  border-radius:3px 0 0 3px;
  flex-shrink:0; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.bk-spine::after {
  content:''; position:absolute; right:0; top:0;
  width:2px; height:100%; background:rgba(0,0,0,.35);
}
.bk-spine-txt {
  writing-mode:vertical-rl; transform:rotate(180deg);
  font-size:7px; color:rgba(255,255,255,.45); font-family:var(--font-mono);
  letter-spacing:1px; text-transform:uppercase; white-space:nowrap;
  overflow:hidden; max-height:140px; text-overflow:ellipsis;
}

/* Couverture principale */
.bk-face {
  width:120px; height:176px;
  border-radius:0 4px 4px 0;
  position:relative; overflow:hidden;
  box-shadow:4px 8px 28px rgba(0,0,0,.7), 1px 0 0 rgba(255,255,255,.08);
}

/* Image de couverture */
.bk-cover-img {
  width:100%; height:100%;
  object-fit:cover; object-position:center;
  display:block;
  border-radius:0 4px 4px 0;
}

/* Fallback gradient (masqué si image chargée) */
.bk-cover-fallback {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  padding:13px 11px;
  border-radius:0 4px 4px 0;
}
.bk-cover-fallback.hidden { display:none; }

/* Reflet sur couverture */
.bk-face::before {
  content:''; position:absolute; inset:0; z-index:2; pointer-events:none;
  background:linear-gradient(150deg, rgba(255,255,255,.13) 0%, transparent 50%);
  border-radius:0 4px 4px 0;
}
/* Tranche pages droite */
.bk-face::after {
  content:''; position:absolute; right:0; top:0; z-index:2;
  width:5px; height:100%;
  background:linear-gradient(to right,rgba(0,0,0,.05),rgba(255,255,255,.12) 40%,rgba(200,200,200,.05));
  border-radius:0 4px 4px 0;
}

/* Pages du dessus */
.bk-top-pages {
  position:absolute; width:118px; height:7px;
  top:-6px; left:16px;
  background:repeating-linear-gradient(to right,#bbb 0,#d0d0d0 1px,#f0f0f0 2px,#e0e0e0 3px);
  border-radius:1px 4px 0 0; box-shadow:0 -2px 4px rgba(0,0,0,.25);
}

.bk-emoji { font-size:20px; margin-bottom:7px; line-height:1; }
.bk-titre {
  font-size:9.5px; font-weight:600; color:rgba(255,255,255,.95);
  line-height:1.38; flex:1; overflow:hidden;
  display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical;
}
.bk-auteur {
  font-size:8px; color:rgba(255,255,255,.5); margin-top:6px;
  font-style:italic; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
}
.bk-annee {
  font-size:7.5px; color:rgba(255,255,255,.28);
  font-family:var(--font-mono); margin-top:3px;
}

/* ──────────────────────────────────────────────
   Rotation 3D du livre
   • Inactifs : angle de côté pour l'effet carrousel
   • Actif    : de face, légèrement surélevé
────────────────────────────────────────────── */
.bk-3d {
  display:flex; position:relative;
  transform:perspective(600px) rotateY(-22deg) rotateX(2deg);
  transition:transform .5s cubic-bezier(.25,.46,.45,.94);
}

/* Le livre actif est parfaitement de face */
.carousel-item.active .bk-3d {
  transform:perspective(900px) rotateY(0deg) rotateX(0deg) translateY(-6px) scale(1.06);
}
/* Hover sur le livre actif = léger tilt */
.carousel-item.active .bk-3d:hover {
  transform:perspective(900px) rotateY(-8deg) rotateX(3deg) translateY(-8px) scale(1.07);
}

/* ══════════════════════════════════════════════════
   POINTS DE NAVIGATION
══════════════════════════════════════════════════ */
.nav-dots { display:flex; gap:5px; justify-content:center; align-items:center; margin-bottom:8px; }
.nav-dot {
  width:5px; height:5px; border-radius:50%;
  background:var(--bd1); cursor:pointer; transition:all .3s;
}
.nav-dot.active {
  background:var(--accent); width:16px; border-radius:99px;
  box-shadow:0 0 6px var(--acglow);
}

/* ══════════════════════════════════════════════════
   CARTE INFO
══════════════════════════════════════════════════ */
.info-card {
  width:100%; max-width:440px; text-align:center;
  padding:8px 0 18px; transition:opacity .3s;
}
.info-badge {
  display:inline-flex; align-items:center; gap:5px;
  font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
  font-family:var(--font-mono); padding:3px 11px;
  border-radius:99px; border:0.5px solid var(--bd2);
  background:var(--tab-act); color:var(--accent); margin-bottom:8px;
}
.info-title { font-size:15px; font-weight:600; color:var(--ct1); margin-bottom:4px; line-height:1.3; }
.info-author { font-size:12px; color:var(--ct2); font-style:italic; margin-bottom:5px; }
.info-meta {
  display:flex; flex-wrap:wrap; justify-content:center; gap:10px;
  font-size:10px; color:var(--ct3); font-family:var(--font-mono);
}
.info-meta span { display:flex; align-items:center; gap:3px; }
.info-btn {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:12px; padding:7px 18px; border-radius:99px;
  border:0.5px solid var(--bd2); background:var(--tab-act);
  color:var(--accent); font-size:11px; cursor:pointer;
  transition:all .2s; font-family:var(--font-sans);
}
.info-btn:hover { background:var(--accent); color:#fff; box-shadow:0 0 16px var(--acglow); border-color:var(--accent); }

/* ══════════════════════════════════════════════════
   ÉTAT VIDE
══════════════════════════════════════════════════ */
.empty { text-align:center; padding:50px 20px; color:var(--ct3); display:none; }
.empty.on { display:block; }
.empty-icon { font-size:40px; margin-bottom:12px; }
.empty-txt { font-size:13px; }

/* ══════════════════════════════════════════════════
   MODAL FICHE DÉTAILLÉE
══════════════════════════════════════════════════ */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.78); z-index:200;
  align-items:center; justify-content:center;
  padding:1rem; backdrop-filter:blur(6px);
}
.modal-overlay.open { display:flex; }
.modal-box {
  background:var(--modal-bg); border:0.5px solid var(--bd2);
  border-radius:18px; padding:24px 22px; width:min(500px,100%);
  max-height:90vh; overflow-y:auto;
  box-shadow:0 24px 70px rgba(0,0,0,.55),0 0 50px var(--acglow);
  animation:modalIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes modalIn { from{opacity:0;transform:scale(.92) translateY(14px)} to{opacity:1;transform:none} }

.modal-header { display:flex; align-items:flex-start; gap:16px; margin-bottom:18px; padding-bottom:16px; border-bottom:0.5px solid var(--bd1); }
.modal-book-mini { flex-shrink:0; }
.modal-info { flex:1; }
.modal-badge { display:inline-block; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; font-family:var(--font-mono); padding:2px 9px; border-radius:99px; border:0.5px solid var(--bd2); background:var(--tab-act); color:var(--accent); margin-bottom:7px; }
.modal-title { font-size:14px; font-weight:600; color:var(--ct1); margin-bottom:3px; line-height:1.3; }
.modal-author { font-size:12px; color:var(--ct2); font-style:italic; }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.modal-field { background:var(--tab-bg); border:0.5px solid var(--bd1); border-radius:9px; padding:9px 11px; }
.modal-field-lbl { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ct3); font-family:var(--font-mono); margin-bottom:3px; }
.modal-field-val { font-size:12px; color:var(--ct1); }
.modal-desc { font-size:12px; color:var(--ct2); line-height:1.75; margin-bottom:18px; }
.modal-close { width:100%; padding:9px; border-radius:99px; border:0.5px solid var(--bd1); background:none; color:var(--ct2); font-size:12px; cursor:pointer; transition:all .2s; font-family:var(--font-sans); }
.modal-close:hover { border-color:var(--bd2); color:var(--ct1); background:var(--tab-act); }

/* ══════════════════════════════════════════════════
   MODAL AJOUT
══════════════════════════════════════════════════ */
.add-modal-box { max-width:420px; }
.add-modal-box input, .add-modal-box select, .add-modal-box textarea {
  width:100%; padding:8px 11px; border:0.5px solid var(--bd1); border-radius:var(--br-md);
  background:var(--input-bg); color:var(--ct1); font-size:12px;
  font-family:var(--font-sans); margin-bottom:9px; outline:none; transition:border .2s;
  -webkit-appearance:none;
}
.add-modal-box input:focus, .add-modal-box select:focus, .add-modal-box textarea:focus { border-color:var(--bd2); box-shadow:0 0 0 2px var(--acglow); }
.add-modal-box select option { background:#0f1420; color:#e8eaf0; }
html.light .add-modal-box select option { background:#fff; color:#18243c; }
.add-modal-box textarea { resize:vertical; min-height:72px; line-height:1.55; }
.field-lbl { font-size:10px; color:var(--ct3); margin-bottom:3px; font-family:var(--font-mono); }
.add-grid { display:grid; grid-template-columns:1fr 1fr; gap:0 12px; }
.modal-footer { display:flex; gap:8px; margin-top:4px; }
.modal-footer button { flex:1; padding:9px; border-radius:99px; font-size:12px; cursor:pointer; font-family:var(--font-sans); transition:all .2s; border:0.5px solid; }
.btn-cancel { background:none; color:var(--ct2); border-color:var(--bd1); }
.btn-cancel:hover { background:var(--tab-bg); color:var(--ct1); border-color:var(--bd2); }
.btn-save { background:var(--tab-act); color:var(--accent); border-color:var(--accent); }
.btn-save:hover { background:var(--accent); color:#fff; box-shadow:0 0 12px var(--acglow); }
.modal-h3 { font-size:14px; font-weight:600; color:var(--ct1); margin-bottom:14px; }

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
.toast {
  position:fixed; bottom:24px; left:50%; z-index:300;
  transform:translateX(-50%) translateY(80px);
  background:rgba(12,17,30,.96); border:0.5px solid var(--bd2);
  border-radius:99px; padding:9px 22px;
  font-size:12px; color:var(--ct1); backdrop-filter:blur(14px);
  box-shadow:0 4px 22px rgba(0,0,0,.4);
  transition:transform .32s cubic-bezier(.34,1.56,.64,1), opacity .32s;
  opacity:0; pointer-events:none; white-space:nowrap;
}
html.light .toast { background:rgba(255,255,255,.97); }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* ══════════════════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════════════════ */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bd1); border-radius:99px; }

/* ══════════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════════ */
@media (max-width:520px) {
  .cycle-tab { font-size:11px; padding:6px 5px; }
  .header-left .title { font-size:16px; }
  .arr { width:30px; height:30px; font-size:15px; }
  .carousel-scene { height:230px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- En-tête -->
  <header class="app-header">
    <div class="header-left">
      <div class="eyebrow">Diplôme d'État · Saxophone</div>
      <div class="title">Répertoires Pédagogiques</div>
      <div class="subtitle">Bibliothèque de partitions</div>
    </div>
    <div class="header-right">
      <!-- Bouton thème : SVG lune ou soleil selon mode -->
      <button class="icon-btn" id="theme-btn" title="Thème">
        <svg id="icon-moon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-sun" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>

let currentCycle  = 1;

const coverCache = {};

/* ══════════════════════════════════════════════════
   COUVERTURES — Google Books API
══════════════════════════════════════════════════ */
function fetchCover(bk, imgEl, fallbackEl){
  // Si déjà en cache
  if(coverCache[bk.id]){
    if(coverCache[bk.id] === 'none'){ fallbackEl.classList.remove('hidden'); return; }
    imgEl.src = coverCache[bk.id];
    return;
  }

  // Requête Google Books par ISBN ou titre+auteur
  const query = bk.isbn
    ? `isbn:${bk.isbn}`
    : encodeURIComponent(`"${bk.titre}" ${bk.auteur}`);
  const url = `https://www.googleapis.com/books/v1/volumes?q=${query}&maxResults=1&fields=items(volumeInfo/imageLinks)`;

  fetch(url)
    .then(r => r.json())
    .then(data => {
      const links = data?.items?.[0]?.volumeInfo?.imageLinks;
      const thumb = links?.thumbnail || links?.smallThumbnail;
      if(thumb){
        // Upgrade vers plus haute résolution
        const hq = thumb.replace('zoom=1','zoom=2').replace('http:','https:');
        coverCache[bk.id] = hq;
        imgEl.src = hq;
        imgEl.onload = () => { fallbackEl.classList.add('hidden'); };
        imgEl.onerror = () => { coverCache[bk.id]='none'; fallbackEl.classList.remove('hidden'); imgEl.style.display='none'; };
      } else {
        coverCache[bk.id] = 'none';
        fallbackEl.classList.remove('hidden');
      }
    })
    .catch(() => {
      coverCache[bk.id] = 'none';
      fallbackEl.classList.remove('hidden');
    });
}

/* ══════════════════════════════════════════════════
   UTILITAIRES COULEUR
══════════════════════════════════════════════════ */
function h2r(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function r2h(r,g,b){ return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function lighten(h,a){ const[r,g,b]=h2r(h); return r2h(r+a,g+a,b+a); }
function darken(h,a){  const[r,g,b]=h2r(h); return r2h(r-a,g-a,b-a); }

/* ══════════════════════════════════════════════════
   CONSTRUCTION DU CAROUSEL
══════════════════════════════════════════════════ */
const ring = document.getElementById('ring');

function getRadius(){
  const w = innerWidth;
  if(w<420) return 175; if(w<600) return 240; if(w<800) return 290; return 330;
}

function buildCarousel(books){
  ring.innerHTML = '';
  const dots    = document.getElementById('nav-dots');
  dots.innerHTML = '';
  const wrap    = document.querySelector('.carousel-wrap');
  const empty   = document.getElementById('empty');
  const infoCard= document.getElementById('info-card');

  document.getElementById('count-badge').textContent =
    books.length ? `${books.length} partition${books.length>1?'s':''}` : 'Aucun résultat';

  if(!books.length){
    empty.classList.add('on'); wrap.style.display='none';
    dots.style.display='none'; infoCard.style.opacity='0'; return;
  }
  empty.classList.remove('on'); wrap.style.display='';
  dots.style.display=''; infoCard.style.opacity='1';

  const n = books.length;
  const step = 360/n;
  const radius = getRadius();

  books.forEach((bk,i)=>{
    const angle = i*step;
    const item = document.createElement('div');
    item.className = 'carousel-item'+(i===currentIndex?' active':'');
    item.style.transform = n===1
      ? 'translateX(-50%) translateY(-50%)'
      : `rotateY(${angle}deg) translateZ(${radius}px) translateX(-50%) translateY(-50%)`;
    item.dataset.index = i;

    const covGrad = `linear-gradient(148deg,${lighten(bk.couleur,16)} 0%,${bk.couleur} 55%,${darken(bk.couleur,12)} 100%)`;

    item.innerHTML = `
      <div class="bk-wrap">
        <div class="bk-glow"></div>
        <div class="bk-3d">
          <div class="bk-top-pages"></div>
          <div class="bk-spine" style="background:${bk.spine}">
            <div class="bk-spine-txt">${bk.auteur}</div>
          </div>
          <div class="bk-face">
            <img class="bk-cover-img" src="" alt="${bk.titre}" style="display:none">
            <div class="bk-cover-fallback" style="background:${covGrad}">
              <div class="bk-emoji">${bk.emoji}</div>
              <div class="bk-titre">${bk.titre}</div>
              <div class="bk-auteur">${bk.auteur}</div>
              <div class="bk-annee">${bk.annee}</div>
            </div>
          </div>
        </div>
      </div>`;

    const imgEl      = item.querySelector('.bk-cover-img');
    const fallbackEl = item.querySelector('.bk-cover-fallback');

    // L'image est cachée jusqu'au chargement ; fallback visible par défaut
    imgEl.style.display = '';
    imgEl.onload  = () => { fallbackEl.classList.add('hidden'); imgEl.style.display=''; };
    imgEl.onerror = () => { imgEl.style.display='none'; fallbackEl.classList.remove('hidden'); };

    fetchCover(bk, imgEl, fallbackEl);

    item.addEventListener('click',()=>{
      if(i===currentIndex) openModalDetail(books[i]);
      else navigateTo(i);
    });
    ring.appendChild(item);

    const dot = document.createElement('div');
    dot.className = 'nav-dot'+(i===currentIndex?' active':'');
    dot.addEventListener('click',()=> navigateTo(i));
    dots.appendChild(dot);
  });

  applyRotation();
  updateInfoCard(books[currentIndex]);
}

function applyRotation(){
  const n = filteredBooks.length;
  if(!n) return;
  ring.style.transform = n===1 ? '' : `rotateY(${-(currentIndex*(360/n))}deg)`;
}

function navigateTo(idx){
  currentIndex = idx;
  ring.querySelectorAll('.carousel-item').forEach((el,i)=> el.classList.toggle('active',i===idx));
  document.querySelectorAll('.nav-dot').forEach((el,i)=> el.classList.toggle('active',i===idx));
  applyRotation();
  updateInfoCard(filteredBooks[idx]);
}

function navigate(dir){
  const n = filteredBooks.length;
  if(!n) return;
  navigateTo((currentIndex+dir+n)%n);
}

function updateInfoCard(bk){
  if(!bk) return;
  document.getElementById('info-badge').textContent   = `Cycle ${currentCycle} · ${bk.genre}`;
  document.getElementById('info-title').textContent   = bk.titre;
  document.getElementById('info-author').textContent  = bk.auteur;
  document.getElementById('info-meta').innerHTML      = `<span>🎵 ${bk.niveau}</span><span>📅 ${bk.annee}</span><span>📚 ${bk.editeur}</span>`;
  document.getElementById('info-detail-btn').onclick  = ()=> openModalDetail(bk);
}

/* ══════════════════════════════════════════════════
   FILTRE + RECHERCHE
══════════════════════════════════════════════════ */
function filterAndRebuild(){
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const all = [...(REPERTOIRE_DATA[currentCycle]||[])];
  filteredBooks = q
    ? all.filter(b=>
        b.titre.toLowerCase().includes(q)||b.auteur.toLowerCase().includes(q)||
        (b.editeur||'').toLowerCase().includes(q)||b.genre.toLowerCase().includes(q)||
        b.niveau.toLowerCase().includes(q)||(b.desc||'').toLowerCase().includes(q))
    : all;
  currentIndex = 0;
  buildCarousel(filteredBooks);
}

function openModalDetail(bk){
  document.getElementById('modal-badge').textContent  = `Cycle ${currentCycle} · ${bk.genre}`;
  document.getElementById('modal-title').textContent  = bk.titre;

  const covGrad = `linear-gradient(148deg,${lighten(bk.couleur,16)} 0%,${bk.couleur} 55%,${darken(bk.couleur,12)} 100%)`;
  const cached  = coverCache[bk.id];
  const miniImg = (cached && cached!=='none')
    ? `<img src="${cached}" style="width:60px;height:88px;object-fit:cover;border-radius:0 4px 4px 0;display:block;">`
    : `<div style="width:60px;height:88px;background:${covGrad};border-radius:0 4px 4px 0;display:flex;align-items:center;justify-content:center;font-size:20px;">${bk.emoji}</div>`;

  document.getElementById('modal-mini-book').innerHTML = `
    <div style="display:flex;transform:perspective(280px) rotateY(-14deg) rotateX(2deg);filter:drop-shadow(4px 6px 14px rgba(0,0,0,.55));">
      <div style="width:10px;height:88px;background:${bk.spine};border-radius:3px 0 0 3px;flex-shrink:0;"></div>
      ${miniImg}
    </div>`;

  document.getElementById('modal-grid').innerHTML = `
    <div class="modal-field"><div class="modal-field-lbl">Éditeur</div><div class="modal-field-val">${bk.editeur}</div></div>
    <div class="modal-field"><div class="modal-field-lbl">Année</div><div class="modal-field-val">${bk.annee}</div></div>
    <div class="modal-field"><div class="modal-field-lbl">Niveau</div><div class="modal-field-val">${bk.niveau}</div></div>
    <div class="modal-field"><div class="modal-field-lbl">Genre</div><div class="modal-field-val">${bk.genre}</div></div>`;

  document.getElementById('modal-desc').textContent = bk.desc||'';
  document.getElementById('modal-detail').classList.add('open');
}

document.getElementById('modal-detail-close').addEventListener('click',()=> document.getElementById('modal-detail').classList.remove('open'));
document.getElementById('modal-detail').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-detail')) document.getElementById('modal-detail').classList.remove('open'); });

/* ══════════════════════════════════════════════════
   MODAL AJOUT
══════════════════════════════════════════════════ */
document.getElementById('add-btn').addEventListener('click',()=>{
  document.getElementById('add-cycle').value = currentCycle;
  document.getElementById('modal-add').classList.add('open');
});
document.getElementById('modal-add-close').addEventListener('click',()=> document.getElementById('modal-add').classList.remove('open'));
document.getElementById('modal-add').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-add')) document.getElementById('modal-add').classList.remove('open'); });

document.getElementById('modal-add-save').addEventListener('click',()=>{
  const titre  = document.getElementById('add-titre').value.trim();
  const auteur = document.getElementById('add-auteur').value.trim();
  const cycle  = parseInt(document.getElementById('add-cycle').value);
  if(!titre||!auteur){ showToast('⚠️ Titre et auteur sont requis'); return; }

  const cols = {1:['#1a3e72','#102850'],2:['#1e4a78','#123260'],3:['#1a285a','#0e1a3c']};
  const emjs = ['🎵','🎼','📖','🎓','🏆','✨','🌊','💎','⚙️','🌱'];
  const [coul,sp] = cols[cycle]||cols[1];

  const newBook = {
    id:'usr_'+Date.now(), titre, auteur,
    editeur:document.getElementById('add-editeur').value.trim()||'—',
    annee:parseInt(document.getElementById('add-annee').value)||new Date().getFullYear(),
    niveau:document.getElementById('add-niveau').value.trim()||'—',
    genre:document.getElementById('add-genre').value.trim()||'—',
    couleur:coul, spine:sp, emoji:emjs[Math.floor(Math.random()*emjs.length)],
    desc:document.getElementById('add-desc').value.trim()
  };

  if(!REPERTOIRE_DATA[cycle]) REPERTOIRE_DATA[cycle]=[];
  REPERTOIRE_DATA[cycle].unshift(newBook);
  ['add-titre','add-auteur','add-editeur','add-annee','add-niveau','add-genre','add-desc']
    .forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-add').classList.remove('open');

  currentCycle = cycle;
  currentIndex = 0;
  document.querySelectorAll('.cycle-tab').forEach(t=>t.classList.toggle('active',parseInt(t.dataset.cycle)===cycle));
  filterAndRebuild();
  showToast('✓ Partition ajoutée !');
});

/* ══════════════════════════════════════════════════
   FIREBASE
══════════════════════════════════════════════════ */
function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    console.log('Firebase connecté ✓');
  }catch(e){ console.info('Firebase — mode local'); }
}

/* ══════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════ */
document.getElementById('arr-l').addEventListener('click',()=> navigate(-1));
document.getElementById('arr-r').addEventListener('click',()=> navigate(1));

document.addEventListener('keydown',e=>{
  if(document.activeElement===document.getElementById('search-input')) return;
  if(e.key==='ArrowLeft')  navigate(-1);
  if(e.key==='ArrowRight') navigate(1);
  if(e.key==='Escape'){
    document.getElementById('modal-detail').classList.remove('open');
    document.getElementById('modal-add').classList.remove('open');
  }
  if(e.key==='Enter'&&filteredBooks[currentIndex]) openModalDetail(filteredBooks[currentIndex]);
});

let touchX=0;
const scene=document.querySelector('.carousel-scene');
scene.addEventListener('touchstart',e=>{ touchX=e.touches[0].clientX; },{passive:true});
scene.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)>44) navigate(dx<0?1:-1);
},{passive:true});
scene.addEventListener('wheel',e=>{ e.preventDefault(); navigate(e.deltaY>0?1:-1); },{passive:false});

/* ══════════════════════════════════════════════════
   ONGLETS CYCLE
══════════════════════════════════════════════════ */
document.querySelectorAll('.cycle-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.cycle-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentCycle=parseInt(tab.dataset.cycle);
    currentIndex=0;
    document.getElementById('search-input').value='';
    filterAndRebuild();
  });
});

/* ══════════════════════════════════════════════════
   RECHERCHE
══════════════════════════════════════════════════ */
let searchTimer;
document.getElementById('search-input').addEventListener('input',()=>{
  clearTimeout(searchTimer); searchTimer=setTimeout(filterAndRebuild,180);
});

/* ══════════════════════════════════════════════════
   RESIZE
══════════════════════════════════════════════════ */
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer); resizeTimer=setTimeout(()=>buildCarousel(filteredBooks),220);
});

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

/* ══════════════════════════════════════════════════
   INITIALISATION
══════════════════════════════════════════════════ */
initFirebase();
filterAndRebuild();
</script>
</body>
</html>

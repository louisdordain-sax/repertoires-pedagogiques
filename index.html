<style>
:root{
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
  --bg:#090c16; --bd1:rgba(55,138,221,.18); --bd2:rgba(55,138,221,.38);
  --c1:#e8eaf0; --c2:#8a9ab8; --c3:#4a5a78;
  --acc:#378ADD; --glow:rgba(55,138,221,.28);
  --tbg:rgba(255,255,255,.04); --tact:rgba(55,138,221,.14);
  --ibg:rgba(22,28,46,.85); --mbg:rgba(9,12,22,.97);
}
html.light{
  --bg:#eaeef8; --bd1:rgba(58,78,112,.18); --bd2:rgba(58,78,112,.38);
  --c1:#18243c; --c2:#3a4e70; --c3:#6a7e9a;
  --acc:#1558a8; --glow:rgba(21,88,168,.22);
  --tbg:rgba(0,0,0,.04); --tact:rgba(21,88,168,.1);
  --ibg:rgba(255,255,255,.88); --mbg:rgba(248,250,255,.98);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--c1);font-family:var(--font);}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 110% 52% at 50% 0%,#0d1a3a 0%,var(--bg) 68%);}
html.light body::before{background:radial-gradient(ellipse 110% 52% at 50% 0%,#ccdaff 0%,var(--bg) 68%);}

/* ══ LAYOUT PLEIN ÉCRAN 3 BANDES ══════════════════════ */
.app{position:relative;z-index:1;height:100vh;width:100%;max-width:700px;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;}

/* Haut */
.top{flex-shrink:0;padding:0 20px;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;}
.eyebrow{font-size:8.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--c3);font-family:var(--mono);margin-bottom:3px;}
.ttl{font-size:18px;font-weight:700;color:var(--c1);letter-spacing:-.3px;}
.sub{font-size:10px;color:var(--acc);font-family:var(--mono);margin-top:2px;opacity:.85;}
.hdr-r{display:flex;gap:8px;}
.ibtn{width:32px;height:32px;border-radius:50%;border:.5px solid var(--bd1);background:var(--tbg);
  color:var(--c2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.ibtn:hover{border-color:var(--bd2);color:var(--c1);background:var(--tact);}
.ibtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}

.ctrls{padding-bottom:8px;}
.tabs{display:flex;gap:5px;margin-bottom:8px;}
.tab{flex:1;text-align:center;font-size:11px;font-weight:500;padding:6px 6px;border-radius:99px;white-space:nowrap;
  border:.5px solid var(--bd1);background:var(--tbg);color:var(--c2);cursor:pointer;transition:all .2s;}
.tab:hover{border-color:var(--bd2);color:var(--c1);}
.tab.act{background:var(--tact);color:var(--acc);border-color:var(--acc);box-shadow:0 0 11px var(--glow);}
.srch-w{position:relative;}
.srch-i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--c3);font-size:11px;pointer-events:none;}
.srch{width:100%;padding:7px 14px 7px 33px;border:.5px solid var(--bd1);border-radius:99px;
  background:var(--ibg);color:var(--c1);font-size:12px;font-family:var(--font);outline:none;transition:all .2s;}
.srch::placeholder{color:var(--c3);}
.srch:focus{border-color:var(--bd2);box-shadow:0 0 0 3px var(--glow);}

/* Centre — flex:1 = tout l'espace restant */
.mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:visible;min-height:0;}
.cnt{font-size:8px;color:var(--c3);font-family:var(--mono);letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:5px;}

/* Scène 3D */
.cw{width:100%;position:relative;}
.cs{width:100%;height:240px;perspective:1100px;position:relative;overflow:visible;}
.cr{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .72s cubic-bezier(.25,.46,.45,.94);}
.ci{position:absolute;top:50%;left:50%;cursor:pointer;transform-style:preserve-3d;}
.ci:not(.act) .bw{opacity:.38;filter:brightness(.5) saturate(.55);}
.ci.act .bw{opacity:1;}

.arr{position:absolute;top:50%;transform:translateY(-50%);
  width:33px;height:33px;border-radius:50%;border:.5px solid var(--bd2);
  background:rgba(9,12,22,.82);color:var(--c2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:all .2s;z-index:10;user-select:none;}
.arr:hover{border-color:var(--acc);color:var(--acc);box-shadow:0 0 11px var(--glow);}
html.light .arr{background:rgba(238,243,252,.9);}
.arr.l{left:3px;}.arr.r{right:3px;}

.dots{display:flex;gap:5px;justify-content:center;align-items:center;margin-top:7px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--bd1);cursor:pointer;transition:all .3s;}
.dot.act{background:var(--acc);width:15px;border-radius:99px;box-shadow:0 0 5px var(--glow);}

/* Livre */
.bw{position:relative;transform:translateX(-50%) translateY(-50%);transition:filter .32s,opacity .32s;display:flex;}
.bg{position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);
  width:72%;height:13px;border-radius:50%;background:var(--glow);filter:blur(8px);
  opacity:0;transition:opacity .4s;pointer-events:none;}
.ci.act .bg{opacity:1;}

.b3{display:flex;align-items:stretch;
  transform:perspective(580px) rotateY(-24deg) rotateX(2deg);
  transition:transform .48s cubic-bezier(.25,.46,.45,.94);}
/* actif : de face. +8px pour centrer la face (pas la tranche) */
.ci.act .b3{transform:perspective(880px) rotateY(0deg) rotateX(0deg) translateX(8px) translateY(-5px) scale(1.05);}
.ci.act .b3:hover{transform:perspective(880px) rotateY(-9deg) rotateX(3deg) translateX(4px) translateY(-7px) scale(1.06);}

.bs{width:15px;height:180px;border-radius:3px 0 0 3px;flex-shrink:0;
  position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.bs::after{content:'';position:absolute;right:0;top:0;width:2px;height:100%;background:rgba(0,0,0,.35);}
.bs-t{writing-mode:vertical-rl;transform:rotate(180deg);font-size:6px;color:rgba(255,255,255,.38);
  font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;overflow:hidden;max-height:140px;}

.bf{width:124px;height:180px;border-radius:0 4px 4px 0;position:relative;overflow:hidden;flex-shrink:0;
  box-shadow:4px 8px 30px rgba(0,0,0,.78),1px 0 0 rgba(255,255,255,.06);}
.bf::before{content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:linear-gradient(148deg,rgba(255,255,255,.13) 0%,transparent 44%);}
.bf::after{content:'';position:absolute;right:0;top:0;z-index:3;width:5px;height:100%;
  background:linear-gradient(to right,rgba(0,0,0,.03),rgba(255,255,255,.11) 50%,rgba(180,180,180,.03));}
.btp{position:absolute;width:122px;height:7px;top:-6px;left:15px;z-index:2;
  background:repeating-linear-gradient(to right,#bbb 0,#ccc 1px,#efefef 2px,#e0e0e0 3px);
  border-radius:1px 3px 0 0;box-shadow:0 -2px 4px rgba(0,0,0,.28);}
.bc{position:absolute;inset:0;width:100%;height:100%;display:block;border-radius:0 4px 4px 0;}

/* Bas */
.bot{flex-shrink:0;padding:0 20px 14px;text-align:center;}
.ibadge{display:inline-flex;align-items:center;font-size:8px;letter-spacing:1.5px;
  text-transform:uppercase;font-family:var(--mono);padding:3px 11px;border-radius:99px;
  border:.5px solid var(--bd2);background:var(--tact);color:var(--acc);margin-bottom:6px;}
.ittl{font-size:14px;font-weight:600;color:var(--c1);margin-bottom:3px;line-height:1.35;}
.iauth{font-size:11px;color:var(--c2);font-style:italic;margin-bottom:4px;}
.imeta{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;
  font-size:9px;color:var(--c3);font-family:var(--mono);}
.imeta span{display:flex;align-items:center;gap:3px;}
.ifiche{display:inline-flex;align-items:center;gap:5px;margin-top:9px;
  padding:6px 17px;border-radius:99px;border:.5px solid var(--bd2);
  background:var(--tact);color:var(--acc);font-size:10px;cursor:pointer;
  transition:all .2s;font-family:var(--font);}
.ifiche:hover{background:var(--acc);color:#fff;box-shadow:0 0 13px var(--glow);border-color:var(--acc);}

/* Vide */
.empty{display:none;text-align:center;color:var(--c3);}
.empty.on{display:block;}

/* Modals */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;
  align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(7px);}
.ov.open{display:flex;}
.mb{background:var(--mbg);border:.5px solid var(--bd2);border-radius:17px;
  padding:20px 18px;width:min(460px,100%);max-height:87vh;overflow-y:auto;
  box-shadow:0 18px 55px rgba(0,0,0,.65),0 0 36px var(--glow);
  animation:mi .26s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes mi{from{opacity:0;transform:scale(.93) translateY(11px)}to{opacity:1;transform:none}}
.mhdr{display:flex;gap:13px;margin-bottom:15px;padding-bottom:13px;border-bottom:.5px solid var(--bd1);}
.mbmini{flex-shrink:0;}.minfo{flex:1;}
.mbadge{display:inline-block;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;
  font-family:var(--mono);padding:2px 9px;border-radius:99px;border:.5px solid var(--bd2);
  background:var(--tact);color:var(--acc);margin-bottom:7px;}
.mttl{font-size:13px;font-weight:600;color:var(--c1);margin-bottom:3px;line-height:1.3;}
.mauth{font-size:11px;color:var(--c2);font-style:italic;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:13px;}
.mf{background:var(--tbg);border:.5px solid var(--bd1);border-radius:8px;padding:8px 10px;}
.mfl{font-size:7.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--c3);font-family:var(--mono);margin-bottom:3px;}
.mfv{font-size:11px;color:var(--c1);}
.mdesc{font-size:11px;color:var(--c2);line-height:1.75;margin-bottom:14px;}
.mclose{width:100%;padding:8px;border-radius:99px;border:.5px solid var(--bd1);background:none;
  color:var(--c2);font-size:11px;cursor:pointer;transition:all .2s;font-family:var(--font);}
.mclose:hover{border-color:var(--bd2);color:var(--c1);background:var(--tact);}

.ambox{max-width:400px;}
.ambox input,.ambox select,.ambox textarea{
  width:100%;padding:7px 10px;border:.5px solid var(--bd1);border-radius:7px;
  background:var(--ibg);color:var(--c1);font-size:11px;font-family:var(--font);
  margin-bottom:7px;outline:none;transition:border .2s;-webkit-appearance:none;}
.ambox input:focus,.ambox select:focus,.ambox textarea:focus{border-color:var(--bd2);box-shadow:0 0 0 2px var(--glow);}
.ambox textarea{resize:vertical;min-height:64px;line-height:1.55;}
.fl{font-size:9px;color:var(--c3);margin-bottom:2px;font-family:var(--mono);}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:0 10px;}
.mfoot{display:flex;gap:8px;margin-top:4px;}
.mfoot button{flex:1;padding:8px;border-radius:99px;font-size:11px;cursor:pointer;
  font-family:var(--font);transition:all .2s;border:.5px solid;}
.bcnl{background:none;color:var(--c2);border-color:var(--bd1);}
.bcnl:hover{background:var(--tbg);color:var(--c1);}
.bsav{background:var(--tact);color:var(--acc);border-color:var(--acc);}
.bsav:hover{background:var(--acc);color:#fff;}
.mh3{font-size:12.5px;font-weight:600;color:var(--c1);margin-bottom:12px;}

.toast{position:fixed;bottom:18px;left:50%;z-index:300;
  transform:translateX(-50%) translateY(65px);
  background:rgba(10,15,28,.97);border:.5px solid var(--bd2);border-radius:99px;
  padding:7px 19px;font-size:11px;color:var(--c1);
  box-shadow:0 4px 18px rgba(0,0,0,.45);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;pointer-events:none;white-space:nowrap;}
html.light .toast{background:rgba(255,255,255,.97);}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--bd1);border-radius:99px;}

@media(max-width:440px){
  .tab{font-size:10px;padding:5px 4px;}
  .ttl{font-size:15px;}
  .cs{height:200px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- HAUT -->
  <div class="top">
    <header class="hdr">
      <div>
        <div class="eyebrow">Diplôme d'État · Saxophone</div>
        <div class="ttl">Répertoires Pédagogiques</div>
        <div class="sub">Bibliothèque de partitions</div>
      </div>
      <div class="hdr-r">
        <button class="ibtn" id="theme-btn" title="Thème">
          <svg id="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="icon-sun" viewBox="0 0 24 24" style="display:none">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="ibtn" id="add-btn" title="Ajouter">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </header>
    <div class="ctrls">
      <div class="tabs">
        <div class="tab act" data-cycle="1">Cycle 1</div>
        <div class="tab" data-cycle="2">Cycle 2</div>
        <div class="tab" data-cycle="3">Cycle 3</div>
      </div>
      <div class="srch-w">
        <span class="srch-i">🔍</span>
        <input class="srch" id="srch" type="text" placeholder="Titre, auteur, éditeur, genre…" autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>

  <!-- CENTRE -->
  <div class="mid">
    <div class="cnt" id="cnt">—</div>
    <div class="cw">
      <button class="arr l" id="arrl">‹</button>
      <div class="cs"><div class="cr" id="ring"></div></div>
      <button class="arr r" id="arrr">›</button>
    </div>
    <div class="empty" id="empty"><div style="font-size:34px;margin-bottom:8px">🔍</div><div style="font-size:12px">Aucune partition trouvée.</div></div>
    <div class="dots" id="dots"></div>
  </div>

  <!-- BAS -->
  <div class="bot">
    <div class="ibadge" id="ibadge"> </div>
    <div class="ittl" id="ittl">Sélectionnez une partition</div>
    <div class="iauth" id="iauth"></div>
    <div class="imeta" id="imeta"></div>
    <button class="ifiche" id="ifiche">Voir la fiche complète →</button>
  </div>
</div>

<!-- Modal fiche -->
<div class="ov" id="od">
  <div class="mb">
    <div class="mhdr">
      <div class="mbmini" id="mmini"></div>
      <div class="minfo">
        <div class="mbadge" id="mbadge"></div>
        <div class="mttl" id="mttl"></div>
        <div class="mauth" id="mauth"></div>
      </div>
    </div>
    <div class="mgrid" id="mgrid"></div>
    <p class="mdesc" id="mdesc"></p>
    <button class="mclose" id="odclose">Fermer</button>
  </div>
</div>

<!-- Modal ajout -->
<div class="ov" id="oa">
  <div class="mb ambox">
    <div class="mh3">Ajouter une partition</div>
    <div class="fl">Titre *</div><input type="text" id="at" placeholder="50 Études Faciles…" maxlength="120">
    <div class="ag">
      <div><div class="fl">Auteur *</div><input type="text" id="au" placeholder="Guy Lacour" maxlength="80"></div>
      <div><div class="fl">Éditeur</div><input type="text" id="ae" placeholder="Billaudot" maxlength="60"></div>
    </div>
    <div class="ag">
      <div><div class="fl">Année</div><input type="number" id="ay" placeholder="1974" min="1800" max="2099"></div>
      <div><div class="fl">Cycle *</div>
        <select id="ac"><option value="1">Cycle 1</option><option value="2">Cycle 2</option><option value="3">Cycle 3</option></select>
      </div>
    </div>
    <div class="ag">
      <div><div class="fl">Niveau</div><input type="text" id="an" placeholder="Débutant" maxlength="40"></div>
      <div><div class="fl">Genre</div><input type="text" id="ag2" placeholder="Études…" maxlength="40"></div>
    </div>
    <div class="fl">URL couverture (optionnel)</div><input type="url" id="acu" placeholder="https://…">
    <div class="fl">Description</div>
    <textarea id="ad" placeholder="Notes pédagogiques…" maxlength="600"></textarea>
    <div class="mfoot">
      <button class="bcnl" id="oaclose">Annuler</button>
      <button class="bsav" id="oasave">✓ Ajouter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════ DONNÉES ════════════════════════════════ */
const DATA={
  1:[
    {id:"c1_01",titre:"50 Études Faciles et Progressives",st:"Vol. 1",auteur:"Guy Lacour",editeur:"Billaudot",annee:1974,niveau:"Débutant",genre:"Études",col:"#1a3e72",sp:"#0d2448",cu:null,desc:"Recueil incontournable pour les premières années. Ces 50 études progressives couvrent les fondamentaux : sons tenus, legato, staccato, articulations de base. Idéal pour structurer les deux premières années de pratique."},
    {id:"c1_02",titre:"Méthode Complète de Saxophone",st:"",auteur:"Hyacinthe Klosé",editeur:"Leduc",annee:1846,niveau:"Débutant",genre:"Méthode",col:"#2d1a50",sp:"#1c0e34",cu:null,desc:"La méthode originelle pour saxophone, écrite par le collaborateur d'Adolphe Sax. Fondamentale dans l'histoire pédagogique de l'instrument, elle pose les bases de la technique classique française."},
    {id:"c1_03",titre:"L'Indispensable du Saxophone",st:"",auteur:"Denis Gäbel",editeur:"Lemoine",annee:2004,niveau:"Débutant",genre:"Méthode",col:"#1a4a3a",sp:"#0e2e24",cu:null,desc:"Approche pédagogique moderne intégrant lecture, solfège rythmique et pièces variées avec supports audio. Méthode adaptée aux élèves contemporains, couvrant les deux premières années de cycle 1."},

/* ════════════ DESSIN COUVERTURE CANVAS ═══════════════ */
function h2rgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function lc(h,a){const{r,g,b}=h2rgb(h);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}
function dc(h,a){const{r,g,b}=h2rgb(h);return`rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;}

function wrap(ctx,txt,maxW,fs){
  ctx.font=fs;
  return txt.split(' ').reduce((lines,w)=>{
    const cur=lines[lines.length-1];
    if(cur&&ctx.measureText(cur+' '+w).width<=maxW){lines[lines.length-1]=cur+' '+w;}
    else lines.push(w);
    return lines;
  },['']);
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawCover(cvs,bk){
  const W=cvs.width,H=cvs.height,ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,W,H);

  // Fond dégradé
  const g=ctx.createLinearGradient(0,0,W*.4,H);
  g.addColorStop(0,lc(bk.col,22));g.addColorStop(.55,bk.col);g.addColorStop(1,dc(bk.col,16));
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Bande haute éditeur
  const bh=Math.round(H*.2);
  const gt=ctx.createLinearGradient(0,0,0,bh);
  gt.addColorStop(0,'rgba(255,255,255,0.2)');gt.addColorStop(1,'rgba(255,255,255,0.05)');
  ctx.fillStyle=gt;ctx.fillRect(0,0,W,bh);

  // Séparateur
  ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=.7;
  ctx.beginPath();ctx.moveTo(6,bh);ctx.lineTo(W-6,bh);ctx.stroke();

  // Nom éditeur
  const efont=`600 ${Math.round(W*.083)}px -apple-system,Helvetica,sans-serif`;
  ctx.font=efont;ctx.letterSpacing='1.5px';
  ctx.fillStyle='rgba(255,255,255,0.72)';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(bk.editeur.toUpperCase(),W/2,bh/2);
  ctx.letterSpacing='0px';

  // Lignes texture subtile
  ctx.strokeStyle='rgba(255,255,255,0.048)';ctx.lineWidth=1;
  for(let y=bh+12;y<H-54;y+=13){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Zone titre (fond semi-transparent)
  const ty=bh+8,th=Math.round(H*.46);
  ctx.fillStyle='rgba(255,255,255,0.09)';
  rr(ctx,7,ty,W-14,th,4);ctx.fill();

  // Titre
  const tfs=`700 ${Math.round(W*.108)}px -apple-system,Helvetica,sans-serif`;
  const lines=wrap(ctx,bk.titre,W-22,tfs);
  ctx.font=tfs;ctx.fillStyle='rgba(255,255,255,0.97)';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const lh=Math.round(W*.108)*1.25,tot=lines.length*lh;
  let ly=ty+(th-tot)/2+lh/2;
  lines.forEach(l=>{ctx.fillText(l,W/2,ly);ly+=lh;});

  // Sous-titre
  if(bk.st){
    ctx.font=`400 italic ${Math.round(W*.075)}px Georgia,serif`;
    ctx.fillStyle='rgba(255,255,255,0.52)';
    ctx.textBaseline='top';
    ctx.fillText(bk.st,W/2,ty+th+7);
  }

  // Ligne médiane décorative
  const my=ty+th+(bk.st?28:13);
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(W*.18,my);ctx.lineTo(W*.82,my);ctx.stroke();

  // Auteur
  ctx.font=`400 ${Math.round(W*.088)}px Georgia,'Times New Roman',serif`;
  ctx.fillStyle='rgba(255,255,255,0.84)';
  ctx.textBaseline='bottom';ctx.textAlign='center';
  ctx.fillText(bk.auteur,W/2,H-28);

  // Année
  ctx.font=`300 ${Math.round(W*.068)}px -apple-system,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.textBaseline='bottom';
  ctx.fillText(String(bk.annee),W/2,H-12);

  // Reflet diagonal
  const gr=ctx.createLinearGradient(0,0,W*.65,H*.42);
  gr.addColorStop(0,'rgba(255,255,255,0.11)');gr.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
}

/* ════════════ ÉTAT + THÈME ═══════════════════════════ */
let cyc=1,idx=0,books=[];
let dark=!document.documentElement.classList.contains('light');
function applyIcons(){
  document.getElementById('icon-moon').style.display=dark?'':'none';
  document.getElementById('icon-sun').style.display=dark?'none':'';
}
try{if(localStorage.getItem('rep_theme_v1')==='light')dark=false;}catch(e){}
applyIcons();
document.getElementById('theme-btn').onclick=()=>{
  dark=!dark;document.documentElement.classList.toggle('light',!dark);
  try{localStorage.setItem('rep_theme_v1',dark?'dark':'light');}catch(e){}
  applyIcons();
};

/* ════════════ CAROUSEL ═══════════════════════════════ */
const ring=document.getElementById('ring');

function radius(){const w=innerWidth;return w<440?165:w<620?225:w<800?270:300;}

function build(bklist){
  ring.innerHTML='';
  const dotsEl=document.getElementById('dots');dotsEl.innerHTML='';
  const cw=document.querySelector('.cw'),empty=document.getElementById('empty');
  document.getElementById('cnt').textContent=
    bklist.length?`${bklist.length} partition${bklist.length>1?'s':''}`:'Aucun résultat';

  if(!bklist.length){
    empty.classList.add('on');cw.style.visibility='hidden';
    dotsEl.style.display='none';updateInfo(null);return;
  }
  empty.classList.remove('on');cw.style.visibility='';dotsEl.style.display='';

  const n=bklist.length,step=360/n,R=radius();
  bklist.forEach((bk,i)=>{
    const el=document.createElement('div');
    el.className='ci'+(i===idx?' act':'');
    el.style.transform=n===1
      ?'translateX(-50%) translateY(-50%)'
      :`rotateY(${i*step}deg) translateZ(${R}px) translateX(-50%) translateY(-50%)`;

    el.innerHTML=`<div class="bw"><div class="bg"></div><div class="b3">
      <div class="btp"></div>
      <div class="bs" style="background:${bk.sp}"><div class="bs-t">${bk.auteur}</div></div>
      <div class="bf"><canvas class="bc" width="124" height="180"></canvas></div>
    </div></div>`;

    const cvs=el.querySelector('.bc');
    if(bk.cu){
      const img=new Image();img.crossOrigin='anonymous';
      img.onload=()=>cvs.getContext('2d').drawImage(img,0,0,124,180);
      img.onerror=()=>drawCover(cvs,bk);img.src=bk.cu;
    } else drawCover(cvs,bk);

    el.addEventListener('click',()=>{if(i===idx)openDetail(bklist[i]);else goto(i);});
    ring.appendChild(el);

    const d=document.createElement('div');
    d.className='dot'+(i===idx?' act':'');
    d.onclick=()=>goto(i);dotsEl.appendChild(d);
  });
  rotate();updateInfo(bklist[idx]);
}

function rotate(){
  const n=books.length;if(!n)return;
  ring.style.transform=n===1?'':`rotateY(${-(idx*(360/n))}deg)`;
}
function goto(i){
  idx=i;
  ring.querySelectorAll('.ci').forEach((e,j)=>e.classList.toggle('act',j===i));
  document.querySelectorAll('.dot').forEach((e,j)=>e.classList.toggle('act',j===i));
  rotate();updateInfo(books[i]);
}
function nav(d){const n=books.length;if(!n)return;goto((idx+d+n)%n);}

function updateInfo(bk){
  if(!bk){document.getElementById('ittl').textContent='Aucun résultat';
    ['iauth','ibadge','imeta'].forEach(id=>document.getElementById(id).textContent='');return;}
  document.getElementById('ibadge').textContent=`Cycle ${cyc} · ${bk.genre}`;
  document.getElementById('ittl').textContent=bk.titre;
  document.getElementById('iauth').textContent=bk.auteur;
  document.getElementById('imeta').innerHTML=`<span>🎵 ${bk.niveau}</span><span>📅 ${bk.annee}</span><span>📚 ${bk.editeur}</span>`;
  document.getElementById('ifiche').onclick=()=>openDetail(bk);
}

/* ════════════ FILTRE ═════════════════════════════════ */
function filter(){
  const q=document.getElementById('srch').value.toLowerCase().trim();
  const all=[...(DATA[cyc]||[])];
  books=q?all.filter(b=>[b.titre,b.auteur,b.editeur,b.genre,b.niveau,b.desc||'']
    .some(s=>s.toLowerCase().includes(q))):all;
  idx=0;build(books);
}

/* ════════════ MODAL DÉTAIL ═══════════════════════════ */
function openDetail(bk){
  document.getElementById('mbadge').textContent=`Cycle ${cyc} · ${bk.genre}`;
  document.getElementById('mttl').textContent=bk.titre;
  document.getElementById('mauth').textContent=bk.auteur;

  const mc=document.createElement('canvas');mc.width=60;mc.height=88;
  if(bk.cu){const i=new Image();i.crossOrigin='anonymous';
    i.onload=()=>mc.getContext('2d').drawImage(i,0,0,60,88);
    i.onerror=()=>drawCover(mc,bk);i.src=bk.cu;}
  else drawCover(mc,bk);
  mc.style.cssText='border-radius:0 4px 4px 0;display:block;box-shadow:3px 4px 12px rgba(0,0,0,.5);';
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;transform:perspective(240px) rotateY(-14deg) rotateX(2deg);';
  const sp=document.createElement('div');
  sp.style.cssText=`width:9px;height:88px;background:${bk.sp};border-radius:3px 0 0 3px;flex-shrink:0;`;
  wrap.appendChild(sp);wrap.appendChild(mc);
  document.getElementById('mmini').innerHTML='';document.getElementById('mmini').appendChild(wrap);

  document.getElementById('mgrid').innerHTML=`
    <div class="mf"><div class="mfl">Éditeur</div><div class="mfv">${bk.editeur}</div></div>
    <div class="mf"><div class="mfl">Année</div><div class="mfv">${bk.annee}</div></div>
    <div class="mf"><div class="mfl">Niveau</div><div class="mfv">${bk.niveau}</div></div>
    <div class="mf"><div class="mfl">Genre</div><div class="mfv">${bk.genre}</div></div>`;
  document.getElementById('mdesc').textContent=bk.desc||'';
  document.getElementById('od').classList.add('open');
}
document.getElementById('odclose').onclick=()=>document.getElementById('od').classList.remove('open');
document.getElementById('od').onclick=e=>{if(e.target===document.getElementById('od'))document.getElementById('od').classList.remove('open');};

/* ════════════ MODAL AJOUT ════════════════════════════ */
document.getElementById('add-btn').onclick=()=>{document.getElementById('ac').value=cyc;document.getElementById('oa').classList.add('open');};
document.getElementById('oaclose').onclick=()=>document.getElementById('oa').classList.remove('open');
document.getElementById('oa').onclick=e=>{if(e.target===document.getElementById('oa'))document.getElementById('oa').classList.remove('open');};
document.getElementById('oasave').onclick=()=>{
  const t=document.getElementById('at').value.trim(),a=document.getElementById('au').value.trim();
  const c=parseInt(document.getElementById('ac').value);
  if(!t||!a){toast('⚠️ Titre et auteur requis');return;}
  const cols={1:['#1a3e72','#0d2448'],2:['#1e4a78','#102e50'],3:['#1a285a','#0e183a']};
  const [cl,sp]=cols[c]||cols[1];
  const nb={id:'u'+Date.now(),titre:t,st:'',auteur:a,
    editeur:document.getElementById('ae').value.trim()||'—',
    annee:parseInt(document.getElementById('ay').value)||new Date().getFullYear(),
    niveau:document.getElementById('an').value.trim()||'—',
    genre:document.getElementById('ag2').value.trim()||'—',
    col:cl,sp,cu:document.getElementById('acu').value.trim()||null,
    desc:document.getElementById('ad').value.trim()};
  if(!DATA[c])DATA[c]=[];DATA[c].unshift(nb);
  ['at','au','ae','ay','an','ag2','acu','ad'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('oa').classList.remove('open');
  cyc=c;idx=0;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('act',parseInt(t.dataset.cycle)===c));
  filter();toast('✓ Partition ajoutée !');
};

/* ════════════ NAVIGATION ════════════════════════════ */
document.getElementById('arrl').onclick=()=>nav(-1);
document.getElementById('arrr').onclick=()=>nav(1);
document.addEventListener('keydown',e=>{
  if(document.activeElement===document.getElementById('srch'))return;
  if(e.key==='ArrowLeft')nav(-1);if(e.key==='ArrowRight')nav(1);
  if(e.key==='Escape'){document.getElementById('od').classList.remove('open');document.getElementById('oa').classList.remove('open');}
  if(e.key==='Enter'&&books[idx])openDetail(books[idx]);
});
let tx=0;
const sc=document.querySelector('.cs');
sc.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
sc.addEventListener('touchend',e=>{if(Math.abs(e.changedTouches[0].clientX-tx)>44)nav(e.changedTouches[0].clientX<tx?1:-1);},{passive:true});
sc.addEventListener('wheel',e=>{e.preventDefault();nav(e.deltaY>0?1:-1);},{passive:false});

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('act'));
    t.classList.add('act');cyc=parseInt(t.dataset.cycle);idx=0;
    document.getElementById('srch').value='';filter();
  });
});
let st;document.getElementById('srch').addEventListener('input',()=>{clearTimeout(st);st=setTimeout(filter,180);});
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>build(books),200);});

/* ════════════ TOAST ══════════════════════════════════ */
let tt;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');
  clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('on'),2600);
}

/* ════════════ INIT ═══════════════════════════════════ */
try{firebase.initializeApp(FIREBASE_CONFIG);}catch(e){}
filter();
</script>
